server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    # Match the backend's default OPE_LOCAL_IMPORT_MAX_BYTES value.
    client_max_body_size 10m;

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Stream uploads through to FastAPI instead of buffering the full request.
    location = /api/imports/preview {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # Proxy API + health + SSE to the backend service. SSE needs buffering off.
    location ~ ^/(api|health) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 1h;
    }
}
