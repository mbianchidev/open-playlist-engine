limit_req_zone $binary_remote_addr zone=public_share:10m rate=30r/m;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    limit_req_status 429;

    # Public token routes never enter nginx access/error logs.
    location ^~ /share/ {
        access_log off;
        error_log /dev/null emerg;
        limit_req zone=public_share burst=20 nodelay;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    location ^~ /shared/ {
        access_log off;
        error_log /dev/null emerg;
        limit_req zone=public_share burst=20 nodelay;
        add_header Referrer-Policy "no-referrer" always;
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/public/shares/ {
        access_log off;
        error_log /dev/null emerg;
        limit_req zone=public_share burst=20 nodelay;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # Owner SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + health + SSE to the backend service. SSE needs buffering off.
    location ~ ^/(api|health) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 1h;
    }
}
